<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>画像形式の比較</title>
    <style>
      body {
        font-family: "Franklin Gothic Medium", "Arial Narrow", Arial, sans-serif;
        margin: 0;
        padding: 20px;
      }
      .ImgList {
        display: flex;
        flex-wrap: wrap;
        width: 100vw;
      }
      .ImgBox__small {
        position: relative;
        width: 256px;
        height: calc(256px + 20px);
        max-width: calc(50vw - 30px);
        margin: 10px;
      }

      .ImgBox_Title {
        height: 16px;
        text-align: center;
        font-weight: bold;
        color: #888;
      }
      .ImgBox_Image {
        font-size: 0;
      }
      .ImgBox_Image img {
        width: 100%;
        height: 100%;
        border: 1px solid #aaa;
        object-fit: contain;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <h2>各形式を直接表示</h2>
    <p class="description">
      imgタグで各形式のファイルを読み込む例です。主要ブラウザーではWebPとAVIFがそのまま表示されます。<br />
      ※
      画像クリックで原寸表示します。画質を同程度にする等の調整は行っていないので、ファイルサイズは参考程度としてください。
    </p>
    <div class="ImgList">
      <div class="ImgBox__small">
        <div class="ImgBox_Image">
          <a href="sample.png" target="_blank">
            <img src="sample.png" alt="PNG" />
          </a>
        </div>
        <div class="ImgBox_Title">PNG (2MB)</div>
      </div>

      <div class="ImgBox__small">
        <div class="ImgBox_Image">
          <a href="sample.jpg" target="_blank">
            <img src="sample.jpg" alt="JPEG" />
          </a>
        </div>
        <div class="ImgBox_Title">JPEG (279KB)</div>
      </div>

      <div class="ImgBox__small">
        <div class="ImgBox_Image">
          <a href="sample.webp" target="_blank">
            <img src="sample.webp" alt="WebP" />
          </a>
        </div>
        <div class="ImgBox_Title">WebP (126KB)</div>
      </div>

      <div class="ImgBox__small">
        <div class="ImgBox_Image">
          <a href="sample.avif" target="_blank">
            <img src="sample.avif" alt="AVIF" />
          </a>
        </div>
        <div class="ImgBox_Title">AVIF (73KB)</div>
      </div>
    </div>
  </body>
</html>
